<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>משחק UNO לילדים</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Welcome Screen -->
  <div id="welcome-screen" class="screen">
    <div class="welcome-content">
      <h1 class="game-title">UNO</h1>
      <p class="welcome-subtitle">משחק הקלפים המוכר והאהוב</p>
      <div class="player-count-section">
        <span class="player-count-label">כמה שחקנים?</span>
        <div class="player-count-buttons">
          <button class="player-count-btn" data-count="2">2</button>
          <button class="player-count-btn" data-count="3">3</button>
          <button class="player-count-btn active" data-count="4">4</button>
        </div>
      </div>
      <button id="start-btn" class="btn btn-primary">!בואו נשחק</button>
    </div>
  </div>

  <!-- Game Table -->
  <div id="game-screen" class="screen hidden">
    <div class="game-table">

      <!-- Bot Top -->
      <div class="bot-area bot-top" id="bot-top">
        <div class="bot-name">שחקן 3</div>
        <div class="bot-hand" id="bot-top-hand"></div>
      </div>

      <!-- Bot Left -->
      <div class="bot-area bot-left" id="bot-left">
        <div class="bot-name">שחקן 2</div>
        <div class="bot-hand" id="bot-left-hand"></div>
      </div>

      <!-- Center Area -->
      <div class="center-area">
        <div class="draw-pile" id="draw-pile">
          <div class="card card-back">UNO</div>
        </div>
        <div class="discard-pile" id="discard-pile"></div>
        <div class="direction-indicator" id="direction-indicator"></div>
        <div class="turn-message" id="turn-message"></div>
      </div>

      <!-- Bot Right -->
      <div class="bot-area bot-right" id="bot-right">
        <div class="bot-name">שחקן 4</div>
        <div class="bot-hand" id="bot-right-hand"></div>
      </div>

      <!-- Player Area -->
      <div class="player-area">
        <div class="player-hand" id="player-hand"></div>
        <button id="uno-btn" class="btn btn-uno hidden">!UNO</button>
      </div>

    </div>
  </div>

  <!-- Color Picker Overlay -->
  <div id="color-picker" class="overlay hidden">
    <div class="color-picker-content">
      <h2>?בחר צבע</h2>
      <div class="color-buttons">
        <button class="color-btn color-red" data-color="red"></button>
        <button class="color-btn color-blue" data-color="blue"></button>
        <button class="color-btn color-green" data-color="green"></button>
        <button class="color-btn color-yellow" data-color="yellow"></button>
      </div>
    </div>
  </div>

  <!-- End Screen -->
  <div id="end-screen" class="screen hidden">
    <div id="confetti-container"></div>
    <div class="end-message" id="end-message"></div>
    <button id="play-again-btn" class="btn btn-primary">שחק שוב</button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
