<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNO - משחק קלפים</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ED1C24">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UNO">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Welcome Screen -->
  <div id="welcome-screen" class="screen">
    <div class="welcome-content">
      <h1 class="game-title">UNO</h1>
      <p class="welcome-subtitle">משחק הקלפים המוכר והאהוב</p>
      <div class="player-count-section">
        <span class="player-count-label">כמה שחקנים?</span>
        <div class="player-count-buttons">
          <button class="player-count-btn" data-count="2" aria-label="2 שחקנים">2</button>
          <button class="player-count-btn" data-count="3" aria-label="3 שחקנים">3</button>
          <button class="player-count-btn active" data-count="4" aria-label="4 שחקנים">4</button>
        </div>
      </div>
      <button id="start-btn" class="btn btn-primary" aria-label="התחל משחק">!בואו נשחק</button>
      <button id="stats-btn" class="btn-stats" aria-label="סטטיסטיקות">📊</button>
    </div>
  </div>

  <!-- Game Table -->
  <div id="game-screen" class="screen hidden">
    <div class="game-table">

      <!-- Bot Top -->
      <div class="bot-area bot-top" id="bot-top">
        <div class="bot-name">שחקן 3</div>
        <div class="bot-hand" id="bot-top-hand"></div>
      </div>

      <!-- Bot Left -->
      <div class="bot-area bot-left" id="bot-left">
        <div class="bot-name">שחקן 2</div>
        <div class="bot-hand" id="bot-left-hand"></div>
      </div>

      <!-- Center Area -->
      <div class="center-area">
        <div class="draw-pile" id="draw-pile" role="button" aria-label="שלוף קלף">
          <div class="card card-back">UNO</div>
        </div>
        <div class="discard-pile" id="discard-pile"></div>
        <div class="direction-indicator" id="direction-indicator"></div>
        <div class="turn-message" id="turn-message"></div>
      </div>

      <!-- Bot Right -->
      <div class="bot-area bot-right" id="bot-right">
        <div class="bot-name">שחקן 4</div>
        <div class="bot-hand" id="bot-right-hand"></div>
      </div>

      <!-- Restart Button -->
      <button id="restart-btn" class="btn-restart" title="משחק חדש" aria-label="משחק חדש">&#x21BB;</button>

      <!-- Player Area -->
      <div class="player-area">
        <div class="player-hand" id="player-hand"></div>
        <button id="uno-btn" class="btn btn-uno hidden" aria-label="קרא אונו">!UNO</button>
      </div>

      <div id="game-announcements" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    </div>
  </div>

  <!-- Color Picker Overlay -->
  <div id="color-picker" class="overlay hidden" role="dialog" aria-label="בחר צבע">
    <div class="color-picker-content">
      <h2>?בחר צבע</h2>
      <div class="color-buttons">
        <button class="color-btn color-red" data-color="red" aria-label="אדום"></button>
        <button class="color-btn color-blue" data-color="blue" aria-label="כחול"></button>
        <button class="color-btn color-green" data-color="green" aria-label="ירוק"></button>
        <button class="color-btn color-yellow" data-color="yellow" aria-label="צהוב"></button>
      </div>
    </div>
  </div>

  <!-- End Screen -->
  <div id="end-screen" class="screen hidden">
    <div id="confetti-container"></div>
    <div class="end-message" id="end-message"></div>
    <button id="play-again-btn" class="btn btn-primary" aria-label="שחק שוב">שחק שוב</button>
  </div>

  <div id="animation-layer"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(function() {});
    }
  </script>
</body>
</html>
